{% extends 'base.html' %}

{% block title %}教学平台{% endblock %}

{% block content %}
<div class="container" x-data="loginForm">
    <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">

        <h1 style="font-size: 1.75rem; margin-bottom: var(--space-xl); font-weight: 400; letter-spacing: 0.04em;">
            教学平台
        </h1>

        <!-- 消息提示 -->
        <div x-show="msg" x-cloak
             :style="msgType === 'error' ? 'background:#FFF0F0;color:#A03030' : 'background:#FFF9E6;color:#8B6914'"
             style="font-size: 0.875rem; padding: var(--space-sm) var(--space-md); border-radius: var(--radius); margin-bottom: var(--space-md); text-align: center; max-width: 360px; width: 100%;"
             x-text="msg">
        </div>

        <!-- ====== 登录面板 ====== -->
        <div x-show="mode === 'login'" style="width: 100%; max-width: 360px;">
            <form method="POST" style="width: 100%;">
                {% csrf_token %}
                <input type="hidden" name="action" value="login">

                {% if form.errors %}
                <div style="color: var(--color-danger); font-size: 0.875rem; margin-bottom: var(--space-md); text-align: center;">
                    用户名或密码错误，请重试。
                </div>
                {% endif %}

                <div class="form-group">
                    <input type="text"
                           name="username"
                           class="form-input"
                           placeholder="输入你的名字"
                           x-ref="nameInput"
                           required>
                </div>
                <div class="form-group">
                    <input type="password"
                           name="password"
                           class="form-input"
                           placeholder="密码"
                           x-ref="passInput">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    登 录
                </button>
            </form>

            <p style="text-align: center; margin-top: var(--space-lg);">
                <a href="javascript:void(0)"
                   @click="switchMode('first')"
                   style="font-size: 0.875rem; color: var(--color-accent);">
                    ✨ 还没有账号？首次登录领取
                </a>
            </p>
        </div>

        <!-- ====== 首次登录面板 ====== -->
        <div x-show="mode === 'first'" style="width: 100%; max-width: 360px;">
            <form @submit.prevent="doFirstLogin"
                  style="width: 100%;">
                {% csrf_token %}
                <div style="font-size: 1.125rem; margin-bottom: var(--space-lg); text-align: center; color: var(--color-text);">
                    首次登录 · 领取你的账号
                </div>

                <div class="form-group">
                    <input type="text"
                           name="first_name"
                           class="form-input"
                           placeholder="输入你的真实姓名"
                           x-ref="firstInput"
                           required
                           autofocus>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    领取我的专属密码
                </button>
            </form>

            <p style="font-size: 0.75rem; color: var(--color-text-muted); text-align: center; margin-top: var(--space-sm);">
                系统会为你生成独一无二的密码，请记在小本本上哦～
            </p>

            <p style="text-align: center; margin-top: var(--space-lg);">
                <a href="javascript:void(0)"
                   @click="switchMode('login')"
                   style="font-size: 0.875rem; color: var(--color-text-muted);">
                    ← 返回登录
                </a>
            </p>
        </div>

    </div>
</div>
{% endblock %}

{% block js %}
<style>
    [x-cloak] { display: none !important; }
</style>
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('loginForm', () => ({
            mode: 'login',
            msg: '',
            msgType: 'info',

            switchMode(m) {
                this.mode = m;
                this.msg = '';
                // 切换后自动聚焦对应输入框
                const ref = m === 'login' ? 'nameInput' : 'firstInput';
                this.$nextTick(() => {
                    const el = this.$refs[ref];
                    if (el) el.focus();
                });
            },

            doFirstLogin() {
                const name = this.$refs.firstInput.value.trim();
                if (!name) {
                    this.msg = '请先在输入框里填写你的名字哦～';
                    this.msgType = 'info';
                    this.$refs.firstInput.focus();
                    return;
                }
                this.msg = '';
                firstLogin(name);
            }
        }));
    });
</script>
{% endblock %}
