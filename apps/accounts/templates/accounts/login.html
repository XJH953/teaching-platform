{% extends 'base.html' %}

{% block title %}教学平台{% endblock %}

{% block content %}
<div class="container" x-data="loginForm">
    <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="font-size: 1.75rem; margin-bottom: var(--space-2xl); font-weight: 400; letter-spacing: 0.04em;">
            教学平台
        </h1>

        <form method="POST" style="width: 100%; max-width: 360px;">
            {% csrf_token %}

            {% if form.errors %}
            <div style="color: var(--color-danger); font-size: 0.875rem; margin-bottom: var(--space-md); text-align: center;">
                用户名或密码错误，请重试。
            </div>
            {% endif %}

            <div class="form-group">
                <input type="text"
                       name="username"
                       class="form-input"
                       placeholder="输入你的名字"
                       x-ref="username"
                       required
                       autofocus>
            </div>

            <div class="form-group">
                <input type="password"
                       name="password"
                       class="form-input"
                       placeholder="密码">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                登 录
            </button>
        </form>

        <div class="mt-lg" style="text-align: center;">
            <a href="javascript:void(0)"
               @click="showFirstLogin"
               style="font-size: 0.875rem; color: var(--color-text-muted);">
                还没有账号？首次登录
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('loginForm', () => ({
            showFirstLogin() {
                const name = this.$refs.username.value.trim();
                if (!name) {
                    this.$refs.username.focus();
                    return;
                }
                firstLogin(name);
            }
        }));
    });
</script>
{% endblock %}
