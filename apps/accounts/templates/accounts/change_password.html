{% extends 'base.html' %}

{% block title %}修改密码 · 教学平台{% endblock %}

{% block content %}
<div class="container transition-fade" style="max-width: 420px;">

    <h1>修改密码</h1>

    {% if success %}
        <div class="card mt-lg" style="text-align: center;">
            <div style="font-size: 2rem; margin-bottom: var(--space-md);">✅</div>
            <p>密码修改成功！</p>
            <p class="text-muted mt-sm">下次登录请使用新密码。</p>
            <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary mt-lg">返回首页</a>
        </div>
    {% else %}
        {% if error %}
            <div style="color: var(--color-danger); font-size: 0.875rem; padding: var(--space-sm) var(--space-md); background: #FFF0F0; border-radius: var(--radius); margin-top: var(--space-md);">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="mt-lg">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">当前密码</label>
                <input type="password" name="old_password" class="form-input" placeholder="输入当前密码" required>
            </div>

            <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" name="new_password" class="form-input" placeholder="输入新密码（至少4位）" required>
            </div>

            <div class="form-group">
                <label class="form-label">确认新密码</label>
                <input type="password" name="new_password2" class="form-input" placeholder="再次输入新密码" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">修改密码</button>
        </form>
    {% endif %}

</div>
{% endblock %}
